<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guzmán Óptica - Catálogo de Armazones</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --color-marca: #111111;
            --color-detalles: #555555;
            --fondo-gris-claro: #fcfcfc;
            --borde-muestrario: #e5e5e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--fondo-gris-claro);
            color: #222222;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--borde-muestrario);
        }
        .institucional-titulo {
            font-size: 2.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--color-marca);
            margin: 0 0 8px 0;
        }
        .institucional-subtitulo {
            font-size: 0.95rem;
            color: var(--color-detalles);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .area-catalogacion {
            max-width: 1200px;
            margin: 35px auto 15px auto;
            padding: 0 20px;
        }
        .criterio-bloque {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            gap: 10px;
        }
        .criterio-etiqueta {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777777;
            margin-right: 10px;
        }
        .filtro-opcion {
            background: none;
            border: 1px solid var(--borde-muestrario);
            background-color: #ffffff;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #444444;
            transition: all 0.2s ease;
        }
        .filtro-opcion.seleccionado, .filtro-opcion:hover {
            background-color: var(--color-marca);
            border-color: var(--color-marca);
            color: #ffffff;
        }

        .grilla-catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .celda-armazon {
            background: #ffffff;
            border: 1px solid var(--borde-muestrario);
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .visor-imagen {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            cursor: zoom-in;
        }
        .visor-imagen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .metadatos-armazon {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed var(--borde-muestrario);
        }
        .codigo-armazon {
            font-weight: 600;
            font-size: 0.85rem;
            color: #111111;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .especificaciones-armazon {
            font-size: 0.75rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-visor {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .modal-imagen {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
        }
        .boton-cerrar-visor {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #000000;
            font-size: 35px;
            font-weight: 300;
            cursor: pointer;
        }

        .acceso-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            z-index: 999;
            text-decoration: none;
        }

        footer {
            background-color: #ffffff;
            color: #111111;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid var(--borde-muestrario);
            margin-top: 60px;
        }
        .canales-enlaces {
            margin-bottom: 20px;
        }
        .canales-enlaces a {
            color: #111111;
            font-size: 22px;
            margin: 0 18px;
            text-decoration: none;
        }
        .bloque-direccion {
            font-size: 0.85rem;
            color: #555555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <div class="institucional-titulo">Guzmán Óptica</div>
        <p class="institucional-subtitulo">Catálogo General de Armazones</p>
    </header>

    <div class="area-catalogacion">
        <div class="criterio-bloque">
            <span class="criterio-etiqueta">Familia:</span>
            <button class="filtro-opcion seleccionado" onclick="filtrarCatalogo('todos')">Ver Todo</button>
            <button class="filtro-opcion" onclick="filtrarCatalogo('sol')">Lentes de Sol</button>
            <button class="filtro-opcion" onclick="filtrarCatalogo('receta')">Lentes de Receta</button>
        </div>
        <div class="criterio-bloque">
            <span class="criterio-etiqueta">Composición:</span>
            <button class="filtro-opcion" onclick="filtrarCatalogo('acetato')">Acetato</button>
            <button class="filtro-opcion" onclick="filtrarCatalogo('metal')">Metal</button>
            <button class="filtro-opcion" onclick="filtrarCatalogo('combinado')">Combinado</button>
        </div>
    </div>

    <div class="grilla-catalogo" id="contenedor-muestrario"></div>

    <div id="visorModal" class="modal-visor" onclick="cerrarVisor()">
        <span class="boton-cerrar-visor">&times;</span>
        <img class="modal-imagen" id="imagenAmpliada">
    </div>

    <a href="https://wa.me" class="acceso-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        <div class="canales-enlaces">
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fas fa-map-marker-alt"></i></a>
        </div>
        <div class="bloque-direccion">
            <p><i class="fas fa-info-circle"></i> Catálogo informativo de disponibilidad en local.</p>
            <p>&copy; 2026 Guzmán Óptica. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const registroArmazones = [
            { archivo: "1000091458.jpg.jpeg", tipo: "sol", material: "acetato" },
            { archivo: "1000091459.jpg.jpeg", tipo: "sol", material: "acetato" },
            { archivo: "1000091460.jpg.jpeg", tipo: "sol", material: "metal" },
            { archivo: "1000091462.jpg.jpeg", tipo: "sol", material: "combinado" },
            { archivo: "1000091463.jpg.jpeg", tipo: "sol", material: "acetato" },
            { archivo: "1000122561.jpg.jpeg", tipo: "sol", material: "metal" },
            { archivo: "1000122564.jpg.jpeg", tipo: "sol", material: "acetato" },
            { archivo: "1000122565.jpg.jpeg", tipo: "sol", material: "combinado" },
            { archivo: "1000122566.jpg.jpeg", tipo: "sol", material: "metal" },
            { archivo: "1000122567.jpg.jpeg", tipo: "sol", material: "acetato" },
            { archivo: "1000181875.jpg.jpeg", tipo: "sol", material: "acetato" }
        ];

        const contenedor = document.getElementById('contenedor-muestrario');

        function renderizarMuestrario(lista) {
            contenedor.innerHTML = "";
            lista.forEach((item) => {
                const celda = document.createElement('div');
                celda.className = 'celda-armazon';
                const nombreLimpio = item.archivo.replace('.jpg.jpeg', '');

                celda.innerHTML = `
                    <div class="visor-imagen" onclick="abrirVisor('${item.archivo}')">
                        <img src="${item.archivo}" alt="Lente">
                    </div>
                    <div class="metadatos-armazon">
                        <div class="codigo-armazon">Ref: #${nombreLimpio}</div>
                        <div class="especificaciones-armazon">${item.tipo} / ${item.material}</div>
                    </div>
                `;
                contenedor.appendChild(celda);
            });
        }

        function abrirVisor(origen) {
            const modal = document.getElementById("visorModal");
            const imagen = document.getElementById("imagenAmpliada");
            modal.style.display = "flex";
            imagen.src = origen;
        }

function cerrarVisor() {document.getElementById("visorModal").style.display = "none";}function filtrarCatalogo(tag) {const botones = document.querySelectorAll('.filtro-opcion');botones.forEach(b => b.classList.remove('seleccionado'));event.target.classList.add('seleccionado');if(tag === 'todos') {renderizarMuestrario(registroArmazones);} else {const filtrados = registroArmazones.filter(item =>item.tipo === tag || item.material === tag);renderizarMuestrario(filtrados);}}renderizarMuestrario(registroArmazones);     </script>
</body>
</html>
