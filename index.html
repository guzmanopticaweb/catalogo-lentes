<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guzmán Óptica - Catálogo</title>
    <!-- Importamos la tipografía Montserrat original con variantes Black (900) y Regular (400) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <!-- Iconos para las redes sociales -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style id="estilos-dinamicos"></style>
</head>
<body>
    <header><h1>Guzmán Óptica</h1><p>Catálogo</p></header>
    <div class="area-catalogacion">
        <button class="filtro-opcion seleccionado" onclick="filtrarCatalogo('todos')">Ver Todo</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('sol')">Lentes de Sol</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('receta')">Lentes de Receta</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('acetato')">Acetato</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('metal')">Metal</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('combinado')">Combinado</button>
    </div>
    <div class="grilla-catalogo" id="contenedor-muestrario"></div>
    <div id="visorModal" class="modal-visor" onclick="this.style.display='none'"><img class="modal-imagen" id="imagenAmpliada"></div>
    
    <!-- Conexión directa y fija con tus datos reales de la óptica -->
    <a href="https://wa.me" class="btn-whatsapp-flotante" target="_blank" title="Consultar por WhatsApp"><i class="fab fa-whatsapp"></i></a>

    <footer>
        <div class="contenedor-redes">
            <a href="https://instagram.com" target="_blank" title="Instagram Oficial"><i class="fab fa-instagram"></i></a>
            <a href="https://goo.gl" target="_blank" title="Cómo llegar (Google Maps)"><i class="fas fa-map-marker-alt"></i></a>
        </div>
        <p class="texto-institucional"><i class="fas fa-info-circle"></i> Muestrario de disponibilidad técnica interna. Consultas directas vía canales oficiales.</p>
        <p class="texto-institucional" style="margin-top: 10px;">&copy; 2026 Guzmán Óptica. Todos los derechos reservados.</p>
    </footer>

    <!-- Conexión de tus módulos independientes -->
    <script src="configuracion.js"></script>
    <script src="lista.js"></script>
    
    <script>
        // Aplicamos tus colores y la tipografía Montserrat con sus grosores de marca
        document.getElementById('estilos-dinamicos').innerHTML = `
            body { font-family: ${configuracionMarca.tipoLetra}; background: ${configuracionMarca.colorFondoGeneral}; margin: 0; padding: 0; text-align: center; color: #222; }
            header { background: #fff; padding: 40px 20px; border-bottom: 1px solid ${configuracionMarca.colorBordes}; }
            header h1 { margin: 0 0 10px 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 3px; color: ${configuracionMarca.colorPrincipal}; font-weight: 900; }
            header p { margin: 0; color: ${configuracionMarca.colorTextoSecundario}; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 400; }
            .area-catalogacion { margin: 30px 20px; }
            .filtro-opcion { font-family: ${configuracionMarca.tipoLetra}; background: #fff; border: 1px solid ${configuracionMarca.colorBordes}; padding: 8px 18px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: 400; font-size: 0.85rem; transition: all 0.2s; text-transform: uppercase; }
            .filtro-opcion.seleccionado, .filtro-opcion:hover { background: ${configuracionMarca.colorPrincipal}; color: #fff; border-color: ${configuracionMarca.colorPrincipal}; }
            .grilla-catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
            .celda-armazon { background: ${configuracionMarca.colorFondoCeldas}; border: 1px solid ${configuracionMarca.colorBordes}; padding: 20px; text-align: center; }
            .visor-imagen img { max-width: 100%; height: 180px; object-fit: contain; cursor: zoom-in; }
            .especificaciones-armazon { margin-top: 15px; font-size: 0.8rem; font-weight: 400; text-transform: uppercase; color: ${configuracionMarca.colorTextoSecundario}; letter-spacing: 0.5px; }
            .modal-visor { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); align-items: center; justify-content: center; }
            .modal-imagen { max-width: 90%; max-height: 85%; object-fit: contain; }
            .btn-whatsapp-flotante { position: fixed; bottom: 30px; right: 30px; background-color: #25d366; color: white; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 999; text-decoration: none; transition: transform 0.2s; }
            .btn-whatsapp-flotante:hover { transform: scale(1.05); }
            footer { background-color: #ffffff; color: ${configuracionMarca.colorPrincipal}; padding: 40px 20px; text-align: center; border-top: 1px solid ${configuracionMarca.colorBordes}; margin-top: 60px; }
            .contenedor-redes { margin-bottom: 20px; }
            .contenedor-redes a { color: ${configuracionMarca.colorPrincipal}; font-size: 24px; margin: 0 20px; text-decoration: none; }
            .texto-institucional { font-family: ${configuracionMarca.tipoLetra}; font-size: 0.85rem; color: ${configuracionMarca.colorTextoSecundario}; line-height: 1.6; margin: 0; font-weight: 400; }
        `;

        // Lógica de carga de armazones
        const contenedor = document.getElementById('contenedor-muestrario');
        function renderizarMuestrario(lista) {
            contenedor.innerHTML = "";
            lista.forEach((item, indice) => {
                const celda = document.createElement('div');
                celda.className = 'celda-armazon';
                celda.innerHTML = `<div class="visor-imagen" onclick="document.getElementById('visorModal').style.display='flex';document.getElementById('imagenAmpliada').src='${item.archivo}'"><img src="${item.archivo}"></div><div class="especificaciones-armazon">Modelo ${indice + 1}</div>`;
                contenedor.appendChild(celda);
            });
        }
        function filtrarCatalogo(tag) {
            document.querySelectorAll('.filtro-opcion').forEach(b => b.classList.remove('seleccionado'));
            event.target.classList.add('seleccionado');
            if(tag === 'todos') { renderizarMuestrario(todosLosArmazones); } 
            else { renderizarMuestrario(todosLosArmazones.filter(i => i.tipo === tag || i.material === tag)); }
        }
        renderizarMuestrario(todosLosArmazones);
    </script>
</body>
</html>
