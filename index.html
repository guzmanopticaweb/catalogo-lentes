<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Lentes de Sol</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa; /* Fondo gris claro */
            color: #212529;
            margin: 0;
            padding: 30px 15px;
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: #1a1a1a;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tarjeta-lente {
            background: #ffffff; /* Fondo blanco para resaltar el lente */
            border-radius: 16px;
            border: 1px solid #eaeaea;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .tarjeta-lente img {
            max-width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
        }
        .nombre-lente {
            margin-top: 15px;
            font-weight: 600;
            font-size: 1.05rem;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Lentes de Sol</h1>

    <div class="galeria" id="contenedor-galeria">
        <!-- Las fotos se cargarán aquí automáticamente -->
    </div>

    <script>
        const galeria = document.getElementById('contenedor-galeria');
        
        // Lee los archivos directamente desde la raíz de tu cuenta de GitHub
        fetch('https://github.com')
        .then(response => response.json())
        .then(archivos => {
            // Filtra para mostrar solo las imágenes .jpg.jpeg que subiste
            const imagenes = archivos.filter(archivo => archivo.name.endsWith('.jpg.jpeg'));
            
            imagenes.forEach((imagen, indice) => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-lente';
                tarjeta.innerHTML = `
                    <img src="${imagen.name}" alt="Lente" onerror="this.src='https://placehold.co'">
                    <div class="nombre-lente">Modelo Lente ${indice + 1}</div>
                `;
                galeria.appendChild(tarjeta);
            });
        })
        .catch(err => {
            console.error("Error cargando fotos:", err);
            galeria.innerHTML = "<p style='text-align:center;'>Cargando catálogo de lentes...</p>";
        });
    </script>

</body>
</html>
