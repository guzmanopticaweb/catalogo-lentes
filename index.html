<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guzmán Óptica - Archivo de Armazones</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --color-marca: #111111;
            --fondo-gris-claro: #fcfcfc;
            --borde-muestrario: #e5e5e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--fondo-gris-claro);
            color: #222222;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--borde-muestrario);
        }
        .institucional-titulo {
            font-size: 2.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--color-marca);
            margin: 0 0 8px 0;
        }
        .institucional-subtitulo {
            font-size: 0.95rem;
            color: #555555;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .grilla-catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .celda-armazon {
            background: #ffffff;
            border: 1px solid var(--borde-muestrario);
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .visor-imagen {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            cursor: zoom-in;
        }
        .visor-imagen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .especificaciones-armazon {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .modal-visor {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .modal-imagen {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
        }
        .boton-cerrar-visor {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #000000;
            font-size: 35px;
            font-weight: 300;
            cursor: pointer;
        }

        footer {
            background-color: #ffffff;
            color: #111111;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid var(--borde-muestrario);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <div class="institucional-titulo">Guzmán Óptica</div>
        <p class="institucional-subtitulo">Catálogo General de Armazones</p>
    </header>

    <div class="grilla-catalogo" id="contenedor-muestrario"></div>

    <div id="visorModal" class="modal-visor" onclick="cerrarVisor()">
        <span class="boton-cerrar-visor">&times;</span>
        <img class="modal-imagen" id="imagenAmpliada">
    </div>

    <footer>
        <p>&copy; 2026 Guzmán Óptica. Todos los derechos reservados.</p>
    </footer>

    <script>
        const contenedor = document.getElementById('contenedor-muestrario');

        // Listado estático inicial de tus imágenes numéricas reales confirmadas
        const fotosConfirmadas = [
            "1000091458.jpg.jpeg", "1000091459.jpg.jpeg", "1000091460.jpg.jpeg", 
            "1000091462.jpg.jpeg", "1000091463.jpg.jpeg", "1000122561.jpg.jpeg", 
            "1000122564.jpg.jpeg", "1000122565.jpg.jpeg", "1000122566.jpg.jpeg", 
            "1000122567.jpg.jpeg", "1000181875.jpg.jpeg"
        ];

        // Muestra las primeras fotos fijas en la pantalla
        fotosConfirmadas.forEach((nombreArchivo, indice) => {
            const celda = document.createElement('div');
            celda.className = 'celda-armazon';
            celda.innerHTML = `
                <div class="visor-imagen" onclick="abrirVisor('${nombreArchivo}')">
                    <img src="${nombreArchivo}" alt="Lente">
                </div>
                <div class="especificaciones-armazon">Modelo ${indice + 1}</div>
            `;
            contenedor.appendChild(celda);
        });

        // Generador automático secundario para completar los 59 espacios en grilla
        const totalLentesDeseados = 59;
        const restantes = totalLentesDeseados - fotosConfirmadas.length;

        for (let i = 0; i < restantes; i++) {
            const numeroModelo = fotosConfirmadas.length + i + 1;
            const celda = document.createElement('div');
            celda.className = 'celda-armazon';
            celda.innerHTML = `
                <div class="visor-imagen">
                    <img src="https://placehold.co{numeroModelo}" alt="Lente vacío">
                </div>
                <div class="especificaciones-armazon">Modelo ${numeroModelo}</div>
            `;
            contenedor.appendChild(celda);
        }

        function abrirVisor(origen) {
            document.getElementById("visorModal").style.display = "flex";
            document.getElementById("imagenAmpliada").src = origen;
        }

        function cerrarVisor() {
            document.getElementById("visorModal").style.display = "none";
        }
    </script>
</body>
</html>
