<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Guzmán - Catálogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style id="estilos-dinamicos"></style>
</head>
<body>
    <header>
        <h1>Óptica Guzmán</h1>
        <p>Catálogo</p>
    </header>
    
    <div class="area-catalogacion">
        <button class="filtro-opcion seleccionado" onclick="filtrarCatalogo('todos')">Ver Todo</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('sol')">Lentes de Sol</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('receta')">Lentes de Receta</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('acetato')">Acetato</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('metal')">Metal</button>
        <button class="filtro-opcion" onclick="filtrarCatalogo('combinado')">Combinado</button>
    </div>

    <div class="grilla-catalogo" id="contenedor-muestrario"></div>
    
    <div id="visorModal" class="modal-visor" onclick="this.style.display='none'"><img class="modal-imagen" id="imagenAmpliada"></div>
    
    <footer>
        <div class="contenedor-redes">
            <!-- Enlaces con mensaje automático personalizado para WhatsApp -->
            <a href="https://wa.me/59899105946?text=¡Hola,%20Óptica%20Guzmán!%20Estoy%20viendo%20el%20catálogo%20y%20me%20gustaría%20hacer%20una%20consulta." target="_blank">WhatsApp</a>
            <span style="color: #bf2222; margin: 0 10px;">|</span>
            <a href="https://www.instagram.com/guzmanoptica/" target="_blank">Instagram</a>
            <span style="color: #bf2222; margin: 0 10px;">|</span>
            <a href="https://maps.app.goo.gl/i32mzDoAvDJ5qe327" target="_blank">Ubicación Google Maps</a>
        </div>
        <p class="texto-institucional">Muestrario de disponibilidad técnica interna. Consultas directas vía canales oficiales.</p>
        <p class="texto-institucional" style="margin-top: 10px;">&copy; 2026 Óptica Guzmán. Todos los derechos reservados.</p>
    </footer>

    <!-- Conexión segura con tus módulos independientes -->
    <script src="configuracion.js"></script>
    <script src="lista.js"></script>
    
    <script>
        // Aplicamos el diseño de marca obligatorio inyectando tus parámetros estéticos
        document.getElementById('estilos-dinamicos').innerHTML = `
            body { font-family: ${configuracionMarca.tipoLetra}; background: #ffffff; margin: 0; padding: 0; text-align: center; color: #bf2222; }
            header { background: #ffffff; padding: 50px 20px 30px 20px; border-bottom: 1px solid #e5e5e5; }
            header h1 { margin: 0 0 12px 0; font-size: 3.2rem; text-transform: uppercase; letter-spacing: 2px; color: #bf2222; font-weight: 900; }
            header p { margin: 0; color: #bf2222; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 400; }
            
            .area-catalogacion { margin: 35px 20px; }
            .filtro-opcion { font-family: ${configuracionMarca.tipoLetra}; background: #ffffff; border: 1px solid #e5e5e5; padding: 8px 18px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: 400; font-size: 0.85rem; transition: all 0.2s; text-transform: uppercase; color: #bf2222; letter-spacing: 0.5px; }
            .filtro-opcion.seleccionado, .filtro-opcion:hover { background: #bf2222; color: #ffffff; border-color: #bf2222; font-weight: 900; }
            
            .grilla-catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
            .celda-armazon { background: #ffffff; border: 1px solid #f0f0f0; padding: 25px; text-align: center; border-radius: 4px; }
            .visor-imagen img { max-width: 100%; height: 160px; object-fit: contain; cursor: zoom-in; }
            
            .especificaciones-armazon { margin-top: 15px; font-size: 0.8rem; font-weight: 400; text-transform: uppercase; color: #bf2222; letter-spacing: 1px; }
            
            .modal-visor { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); align-items: center; justify-content: center; }
            .modal-imagen { max-width: 90%; max-height: 85%; object-fit: contain; }
            
            footer { background-color: #ffffff; color: #bf2222; padding: 40px 20px; text-align: center; border-top: 1px solid #e5e5e5; margin-top: 60px; }
            .contenedor-redes { margin-bottom: 20px; }
            .contenedor-redes a { color: #bf2222; font-weight: 400; font-size: 0.9rem; margin: 0 10px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px; }
            .texto-institucional { font-family: ${configuracionMarca.tipoLetra}; font-size: 0.85rem; color: #bf2222; line-height: 1.6; margin: 0; font-weight: 400; opacity: 0.8; }
        `;

        // Sistema de carga del muestrario de armazones
        const contenedor = document.getElementById('contenedor-muestrario');
        function renderizarMuestrario(lista) {
            contenedor.innerHTML = "";
            lista.forEach((item, indice) => {
                const celda = document.createElement('div');
                celda.className = 'celda-armazon';
                celda.innerHTML = `<div class="visor-imagen" onclick="document.getElementById('visorModal').style.display='flex';document.getElementById('imagenAmpliada').src='${item.archivo}'"><img src="${item.archivo}"></div><div class="especificaciones-armazon">Modelo ${indice + 1}</div>`;
                contenedor.appendChild(celda);
            });
        }
        function filtrarCatalogo(tag) {
            document.querySelectorAll('.filtro-opcion').forEach(b => b.classList.remove('seleccionado'));
            event.target.classList.add('seleccionado');
            if(tag === 'todos') { renderizarMuestrario(todosLosArmazones); } 
            else { renderizarMuestrario(todosLosArmazones.filter(i => i.tipo === tag || i.material === tag)); }
        }
        renderizarMuestrario(todosLosArmazones);
    </script>
</body>
</html>
