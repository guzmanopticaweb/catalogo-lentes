<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Lentes de Sol</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 30px 15px;
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: #1a1a1a;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tarjeta-lente {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #eaeaea;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .tarjeta-lente:hover {
            transform: translateY(-5px);
        }
        .tarjeta-lente img {
            max-width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
        }
        .nombre-lente {
            margin-top: 15px;
            font-weight: 600;
            font-size: 1.05rem;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Lentes de Sol</h1>

    <div class="galeria" id="contenedor-galeria"></div>

    <script>
        // Lista exacta de tus archivos detectados en la plataforma
        const fotos = [
            "1000091458.jpg.jpeg", "1000091459.jpg.jpeg", "1000091460.jpg.jpeg", 
            "1000091462.jpg.jpeg", "1000091463.jpg.jpeg", "1000122561.jpg.jpeg", 
            "1000122564.jpg.jpeg", "1000122565.jpg.jpeg", "1000122566.jpg.jpeg", 
            "1000122567.jpg.jpeg", "1000181875.jpg.jpeg"
        ];

        const galeria = document.getElementById('contenedor-galeria');

        fotos.forEach((nombre, indice) => {
            const tarjeta = document.createElement('div');
            tarjeta.className = 'tarjeta-lente';
            tarjeta.innerHTML = `
                <img src="${nombre}" alt="Lente" onerror="this.src='https://placehold.co'">
                <div class="nombre-lente">Modelo Lente ${indice + 1}</div>
            `;
            galeria.appendChild(tarjeta);
        });
    </script>

</body>
</html>
